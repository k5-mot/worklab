services:
  open-webui:
    container_name: worklab-alfa-llm-open-webui
    restart: always
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "30040:8080"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - llm-public
      - llm-internal

  ollama:
    container_name: worklab-alfa-llm-ollama
    restart: always
    image: ollama/ollama:latest
    depends_on:
      - ollama-redis
      - ollama-postgres
    ports:
      - "30041:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - llm-public
      - llm-internal

  ollama-redis:
    container_name: worklab-alfa-llm-ollama-redis
    restart: always
    image: redis:7-alpine
    volumes:
      - ollama-redis-data:/data
    networks:
      - llm-internal

  ollama-postgres:
    container_name: worklab-alfa-llm-ollama-postgres
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ollama
      POSTGRES_USER: ollama
      POSTGRES_PASSWORD: ${OLLAMA_POSTGRES_PASSWORD:-ollama}
    volumes:
      - ollama-postgres-data:/var/lib/postgresql/data
    networks:
      - llm-internal

  qdrant:
    container_name: worklab-alfa-llm-qdrant
    restart: always
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - llm-internal

  paddleocr:
    container_name: worklab-alfa-llm-paddleocr
    restart: always
    build:
      context: ./paddleocr
      dockerfile: Dockerfile
    networks:
      - llm-internal

  searxng:
    container_name: worklab-alfa-llm-searxng
    restart: always
    image: searxng/searxng:latest
    networks:
      - llm-internal

  whisper:
    container_name: worklab-alfa-llm-whisper
    restart: always
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-base}
    networks:
      - llm-internal

  kokoro-tts:
    container_name: worklab-alfa-llm-kokoro-tts
    restart: always
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    networks:
      - llm-internal

  comfyui:
    container_name: worklab-alfa-llm-comfyui
    restart: always
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    ports:
      - "30042:8188"
    volumes:
      - comfyui-data:/app/ComfyUI/output
    networks:
      - llm-public
      - llm-internal

  langfuse:
    container_name: worklab-alfa-llm-langfuse
    restart: always
    image: docker.io/langfuse/langfuse:3
    env_file:
      - ./langfuse/langfuse.env
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - "30043:3000"
    networks:
      - llm-public
      - llm-internal

  langfuse-worker:
    container_name: worklab-alfa-llm-langfuse-worker
    restart: always
    image: docker.io/langfuse/langfuse-worker:3
    env_file:
      - ./langfuse/langfuse.env
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    networks:
      - llm-internal

  langfuse-clickhouse:
    container_name: worklab-alfa-llm-langfuse-clickhouse
    restart: always
    image: docker.io/clickhouse/clickhouse-server
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - llm-internal

  langfuse-minio:
    container_name: worklab-alfa-llm-langfuse-minio
    restart: always
    image: cgr.dev/chainguard/minio
    entrypoint: sh
    command:
      - -c
      - mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "30046:9000"
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
    networks:
      - llm-internal

  langfuse-redis:
    container_name: worklab-alfa-llm-langfuse-redis
    restart: always
    image: docker.io/redis:7
    command:
      - --requirepass
      - myredissecret
      - --maxmemory-policy
      - noeviction
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_AUTH" ping
      interval: 3s
      timeout: 10s
      retries: 10
    environment:
      REDIS_AUTH: myredissecret
    networks:
      - llm-internal

  langfuse-postgres:
    container_name: worklab-alfa-llm-langfuse-postgres
    restart: always
    image: docker.io/postgres:17
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U langfuse -d langfuse
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - llm-internal

  n8n:
    container_name: worklab-alfa-llm-n8n
    restart: always
    image: n8nio/n8n:latest
    ports:
      - "30044:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - llm-public
      - llm-internal

  dify-init-permissions:
    container_name: worklab-alfa-llm-dify-init-permissions
    restart: "no"
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        FLAG_FILE="/app/api/storage/.init_permissions"
        if [ -f "$${FLAG_FILE}" ]; then
          echo "Permissions already initialized. Exiting."
          exit 0
        fi
        echo "Initializing permissions for /app/api/storage"
        chown -R 1001:1001 /app/api/storage && touch "$${FLAG_FILE}"
        echo "Permissions initialized. Exiting."
    volumes:
      - dify-app-storage:/app/api/storage
    networks:
      - llm-internal

  dify-api:
    container_name: worklab-alfa-llm-dify-api
    restart: always
    image: langgenius/dify-api:1.13.0
    env_file:
      - ./dify/dify.env
    environment:
      MODE: api
    depends_on:
      dify-init-permissions:
        condition: service_completed_successfully
      dify-db-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_healthy
      dify-plugin-daemon:
        condition: service_started
      dify-weaviate:
        condition: service_healthy
      dify-ssrf-proxy:
        condition: service_started
    volumes:
      - dify-app-storage:/app/api/storage
    networks:
      - llm-internal
      - llm-dify-ssrf

  dify-worker:
    container_name: worklab-alfa-llm-dify-worker
    restart: always
    image: langgenius/dify-api:1.13.0
    env_file:
      - ./dify/dify.env
    environment:
      MODE: worker
    depends_on:
      dify-init-permissions:
        condition: service_completed_successfully
      dify-db-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_healthy
      dify-plugin-daemon:
        condition: service_started
      dify-weaviate:
        condition: service_healthy
      dify-ssrf-proxy:
        condition: service_started
    volumes:
      - dify-app-storage:/app/api/storage
    networks:
      - llm-internal
      - llm-dify-ssrf

  dify-worker-beat:
    container_name: worklab-alfa-llm-dify-worker-beat
    restart: always
    image: langgenius/dify-api:1.13.0
    env_file:
      - ./dify/dify.env
    environment:
      MODE: beat
    depends_on:
      dify-init-permissions:
        condition: service_completed_successfully
      dify-db-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_healthy
      dify-plugin-daemon:
        condition: service_started
      dify-weaviate:
        condition: service_healthy
      dify-ssrf-proxy:
        condition: service_started
    networks:
      - llm-internal
      - llm-dify-ssrf

  dify-web:
    container_name: worklab-alfa-llm-dify-web
    restart: always
    image: langgenius/dify-web:1.13.0
    env_file:
      - ./dify/dify.env
    depends_on:
      dify-api:
        condition: service_started
    networks:
      - llm-internal

  dify-db-postgres:
    container_name: worklab-alfa-llm-dify-db-postgres
    restart: always
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c 'max_connections=100'
               -c 'shared_buffers=128MB'
               -c 'work_mem=4MB'
               -c 'maintenance_work_mem=64MB'
               -c 'effective_cache_size=4096MB'
               -c 'statement_timeout=0'
               -c 'idle_in_transaction_session_timeout=0'
    volumes:
      - dify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -h
        - localhost
        - -U
        - postgres
        - -d
        - dify
      interval: 1s
      timeout: 3s
      retries: 60
    networks:
      - llm-internal

  dify-redis:
    container_name: worklab-alfa-llm-dify-redis
    restart: always
    image: redis:6-alpine
    environment:
      REDISCLI_AUTH: difyai123456
    command: redis-server --requirepass difyai123456
    volumes:
      - dify-redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a difyai123456 ping | grep -q PONG
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      - llm-internal

  dify-sandbox:
    container_name: worklab-alfa-llm-dify-sandbox
    restart: always
    image: langgenius/dify-sandbox:0.2.12
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://dify-ssrf-proxy:3128
      HTTPS_PROXY: http://dify-ssrf-proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - dify-sandbox-dependencies:/dependencies
      - dify-sandbox-conf:/conf
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8194/health
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - llm-dify-ssrf

  dify-plugin-daemon:
    container_name: worklab-alfa-llm-dify-plugin-daemon
    restart: always
    image: langgenius/dify-plugin-daemon:0.4.1-local
    env_file:
      - ./dify/dify.env
    environment:
      DB_DATABASE: dify_plugin
      SERVER_PORT: 5002
      SERVER_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
    depends_on:
      dify-db-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    volumes:
      - dify-plugin-storage:/app/storage
    networks:
      - llm-internal

  dify-ssrf-proxy:
    container_name: worklab-alfa-llm-dify-ssrf-proxy
    restart: always
    image: ubuntu/squid:latest
    entrypoint:
      - sh
      - -c
      - cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh
    environment:
      HTTP_PORT: 3128
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: 8194
      SANDBOX_HOST: dify-sandbox
      SANDBOX_PORT: 8194
    volumes:
      - ./dify/ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template:ro
      - ./dify/ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh:ro
    networks:
      - llm-internal
      - llm-dify-ssrf

  dify-weaviate:
    container_name: worklab-alfa-llm-dify-weaviate
    restart: always
    image: semitechnologies/weaviate:1.27.0
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      DISABLE_TELEMETRY: "false"
      ENABLE_TOKENIZER_GSE: "false"
      ENABLE_TOKENIZER_KAGOME_JA: "false"
      ENABLE_TOKENIZER_KAGOME_KR: "false"
    volumes:
      - dify-weaviate-data:/var/lib/weaviate
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:8080/v1/.well-known/ready
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - llm-internal

  dify:
    container_name: worklab-alfa-llm-dify
    restart: always
    image: nginx:latest
    depends_on:
      dify-api:
        condition: service_started
      dify-web:
        condition: service_started
      dify-plugin-daemon:
        condition: service_started
    entrypoint:
      - sh
      - -c
      - cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh
    environment:
      NGINX_SERVER_NAME: _
      NGINX_HTTPS_ENABLED: "false"
      NGINX_SSL_PORT: 443
      NGINX_PORT: 80
      NGINX_SSL_CERT_FILENAME: dify.crt
      NGINX_SSL_CERT_KEY_FILENAME: dify.key
      NGINX_SSL_PROTOCOLS: TLSv1.2 TLSv1.3
      NGINX_WORKER_PROCESSES: auto
      NGINX_CLIENT_MAX_BODY_SIZE: 100M
      NGINX_KEEPALIVE_TIMEOUT: 65
      NGINX_PROXY_READ_TIMEOUT: 3600s
      NGINX_PROXY_SEND_TIMEOUT: 3600s
      NGINX_ENABLE_CERTBOT_CHALLENGE: "false"
      CERTBOT_DOMAIN: ""
    ports:
      - "30045:80"
    volumes:
      - ./dify/nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./dify/nginx/proxy.conf.template:/etc/nginx/proxy.conf.template:ro
      - ./dify/nginx/https.conf.template:/etc/nginx/https.conf.template:ro
      - ./dify/nginx/conf.d:/etc/nginx/conf.d
      - ./dify/nginx/docker-entrypoint.sh:/docker-entrypoint-mount.sh:ro
    networks:
      - llm-public
      - llm-internal

volumes:
  open-webui-data:
  ollama-data:
  ollama-redis-data:
  ollama-postgres-data:
  qdrant-data:
  comfyui-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
  langfuse-postgres-data:
  n8n-data:
  dify-app-storage:
  dify-postgres-data:
  dify-redis-data:
  dify-plugin-storage:
  dify-sandbox-dependencies:
  dify-sandbox-conf:
  dify-weaviate-data:

networks:
  llm-public:
  llm-internal:
  llm-dify-ssrf:
