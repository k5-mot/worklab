services:
  keycloak:
    container_name: worklab-alfa-base-keycloak
    restart: always
    image: quay.io/keycloak/keycloak:latest
    command:
      - start-dev
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "30000:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - base-public

  openbao:
    container_name: worklab-alfa-base-openbao
    restart: always
    image: openbao/openbao:latest
    cap_add:
      - IPC_LOCK
    command: server -dev -dev-root-token-id=${OPENBAO_DEV_ROOT_TOKEN_ID:-root}
    environment:
      BAO_ADDR: http://0.0.0.0:8200
      BAO_API_ADDR: http://openbao:8200
    ports:
      - "30001:8200"
    volumes:
      - openbao-data:/openbao/file
    networks:
      - base-public

volumes:
  keycloak-data:
  openbao-data:

networks:
  base-public:
