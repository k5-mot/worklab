global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - scheme: http
      static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: gitlab-workhorse
    static_configs:
      - targets:
          - worklab-alfa-dev-gitlab:9229

  - job_name: gitlab-sidekiq
    static_configs:
      - targets:
          - worklab-alfa-dev-gitlab:8082

  - job_name: gitlab_exporter
    static_configs:
      - targets:
          - worklab-alfa-dev-gitlab:9168
